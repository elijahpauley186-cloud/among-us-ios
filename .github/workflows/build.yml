name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          [ -f index.html ] && mv index.html www/ || true
          [ -f style.css ] && mv style.css www/ || true
          [ -f game.js ] && mv game.js www/ || true
          [ -f icon.png ] && mv icon.png www/ || true

      - name: Initialize Platform
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6 @capacitor/assets
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          
          # Fake pod binary to bypass CLI sync check
          mkdir -p bin
          echo '#!/bin/bash' > bin/pod
          echo 'exit 0' >> bin/pod
          chmod +x bin/pod
          export PATH=$PWD/bin:$PATH
          npx cap add ios

      - name: Configure and Install
        run: |
          cd ios/App
          cat << 'EOF' > Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          npx cap copy ios
          cd ios/App
          mkdir -p build
          
          # Use CONFIGURATION_BUILD_DIR to force predictable output location
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CONFIGURATION_BUILD_DIR=build CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          if [ ! -d "build/App.app" ]; then
            echo "Error: App.app not found in build/ - build failed."
            exit 1
          fi
          
          mkdir -p ../../Payload
          cp -r build/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
