name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          mv *.html www/ 2>/dev/null || true
          mv *.js www/ 2>/dev/null || true
          mv *.css www/ 2>/dev/null || true
          mv *.png www/ 2>/dev/null || true

      - name: Initialize iOS Platform (Safe Mode)
        # CAPACITOR_SKIP_POD_INSTALL=1 is MANDATORY to prevent CLI interference
        env:
          CAPACITOR_SKIP_POD_INSTALL: 1
        run: |
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          npx cap add ios

      - name: Finalize iOS Configuration
        run: |
          # 1. Force the platform target globally for the build
          mkdir -p ios/App
          echo "platform :ios, '14.0'" > ios/App/Podfile
          echo "use_frameworks!" >> ios/App/Podfile
          echo "target 'App' do" >> ios/App/Podfile
          echo "  pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'" >> ios/App/Podfile
          echo "  pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'" >> ios/App/Podfile
          echo "end" >> ios/App/Podfile
          
          # 2. Force CocoaPods to use this Podfile and ignore the cache
          cd ios/App
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --deployment

      - name: Build and Package
        run: |
          cd ios/App
          # Explicitly set the deployment target during the build command
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
