name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # Ensure your index.html and other assets are in the 'www' folder
          # The previous logs show you are copying from 'www'
          [ -f index.html ] && mv index.html www/ || true
          [ -f style.css ] && mv style.css www/ || true
          [ -f game.js ] && mv game.js www/ || true
          [ -f icon.png ] && mv icon.png www/ || true

      - name: Initialize and Add iOS
        # CAPACITOR_SKIP_POD_INSTALL=1 is the MANDATORY fix
        # It stops the CLI from running the incompatible pod install
        env:
          CAPACITOR_SKIP_POD_INSTALL: 1
        run: |
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          npx cap add ios

      - name: Inject Target and Install
        run: |
          mkdir -p ios/App
          # Explicitly set the platform to 14.0
          cat << 'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          # Clean and perform the install ourselves
          cd ios/App
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          npx cap sync ios
          cd ios/App
          # Force the build to respect the 14.0 target
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
