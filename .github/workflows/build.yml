name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          [ -f index.html ] && mv index.html www/ || true
          [ -f style.css ] && mv style.css www/ || true
          [ -f game.js ] && mv game.js www/ || true

      - name: Initialize Platform
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6 @capacitor/assets
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          
          # Add platform and generate assets
          npx cap add ios
          npx capacitor-assets generate --ios
          
          # Mock pod binary
          mkdir -p bin
          echo '#!/bin/bash' > bin/pod
          echo 'exit 0' >> bin/pod
          chmod +x bin/pod
          export PATH=$PWD/bin:$PATH

      - name: Configure and Install
        run: |
          cd ios/App
          cat << 'EOF' > Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          npx cap copy ios
          cd ios/App
          
          # Clean build artifacts
          xcodebuild clean -workspace App.xcworkspace -scheme App
          
          # Archive with explicit AppIcon reference
          xcodebuild archive -workspace App.xcworkspace -scheme App -sdk iphoneos -archivePath App.xcarchive -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          IPHONEOS_DEPLOYMENT_TARGET=14.0 \
          ARCHS=arm64 \
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon
          
          # Extract and zip
          APP_PATH="App.xcarchive/Products/Applications/App.app"
          mkdir -p ../../Payload
          cp -r "$APP_PATH" ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
