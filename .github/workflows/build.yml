name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Pre-configure iOS Project
        run: |
          # Create the directory structure manually so Capacitor skips its own initialization
          mkdir -p ios/App
          # Create a Podfile with the correct target BEFORE Capacitor touches anything
          echo "platform :ios, '14.0'" > ios/App/Podfile
          echo "use_frameworks!" >> ios/App/Podfile
          echo "target 'App' do" >> ios/App/Podfile
          echo "  pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'" >> ios/App/Podfile
          echo "  pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'" >> ios/App/Podfile
          echo "end" >> ios/App/Podfile

      - name: Initialize Capacitor
        run: |
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          # This should now see the existing directory and skip automatic pod install
          npx cap add ios

      - name: Install Pods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Generate App Icons
        run: |
          mkdir -p assets
          cp icon.png assets/icon-only.png
          npx capacitor-assets generate --ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build Xcode Project
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package IPA Bundle
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
