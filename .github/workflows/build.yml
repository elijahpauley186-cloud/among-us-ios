name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          [ -f index.html ] && cp index.html www/
          [ -f style.css ] && cp style.css www/
          [ -f game.js ] && cp game.js www/
          [ -f icon.png ] && cp icon.png www/

      - name: Initialize iOS Platform (Manual Mode)
        # CAPACITOR_SKIP_POD_INSTALL stops the CLI from running its internal, incompatible pod install
        env:
          CAPACITOR_SKIP_POD_INSTALL: 1
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          npx cap add ios

      - name: Manual Podfile Enforcement
        run: |
          mkdir -p ios/App
          # Explicitly set the platform to 14.0 in the Podfile
          cat << 'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          # Manually install pods with the correct target
          cd ios/App
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          npx cap sync ios
          cd ios/App
          # Ensure Xcode respects the 14.0 target
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
