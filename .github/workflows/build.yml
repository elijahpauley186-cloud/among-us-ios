name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Initialize and Add iOS Platform
        env:
          CAPACITOR_SKIP_POD_INSTALL: 1
        run: |
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          npx cap add ios
          # Explicitly set the platform version in the Podfile immediately
          echo "platform :ios, '14.0'" > ios/App/Podfile
          echo "use_frameworks!" >> ios/App/Podfile
          echo "target 'App' do" >> ios/App/Podfile
          echo "  pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'" >> ios/App/Podfile
          echo "  pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'" >> ios/App/Podfile
          echo "end" >> ios/App/Podfile

      - name: Configure and Install Pods
        run: |
          cd ios/App
          # Clean up any cached state that might hold onto old versions
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Sync, Build, and Package
        run: |
          npx cap sync ios
          cd ios/App
          # Ensure Xcode project settings use the target version
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
