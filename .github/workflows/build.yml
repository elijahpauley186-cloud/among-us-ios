name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize Platform
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6 @capacitor/assets
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          
          # Generate icons - no --icon flag needed, it detects icon.png automatically
          npx capacitor-assets generate --ios
          
          mkdir -p bin
          echo '#!/bin/bash' > bin/pod
          echo 'exit 0' >> bin/pod
          chmod +x bin/pod
          export PATH=$PWD/bin:$PATH
          npx cap add ios

      - name: Configure and Install
        run: |
          cd ios/App
          cat << 'EOF' > Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          npx cap copy ios
          cd ios/App
          
          # Archive build to ensure all modules are linked properly
          xcodebuild archive -workspace App.xcworkspace -scheme App -sdk iphoneos -archivePath App.xcarchive -configuration Release CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0 ARCHS=arm64
          
          # The archive puts the .app here reliably
          APP_PATH="App.xcarchive/Products/Applications/App.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App.app not found in archive."
            exit 1
          fi
          
          mkdir -p ../../Payload
          cp -r "$APP_PATH" ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
