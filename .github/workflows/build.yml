name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Structure Directories
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp game.js www/ 2>/dev/null || true
          cp style.css www/ 2>/dev/null || true

      - name: Initialize and Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6
          npx cap init "Among Us iPad" "com.yourname.amongus" --web-dir=www
          npm install @capacitor/ios@6
          npx cap add ios

      - name: Force Higher iOS Deployment Target
        run: |
          sed -i '' 's/platform :ios, '"'"'14.0'"'"'/platform :ios, '"'"'14.0'"'"'/g' ios/App/Podfile

      - name: Sync Web Assets
        run: |
          npx cap sync ios

      - name: Compile Native iOS App Binary
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Micro-Bundle IPA (Unsigned Payload)
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r AmongUs.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: native-app-package
          path: AmongUs.ipa
