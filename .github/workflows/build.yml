name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          [ -f index.html ] && mv index.html www/ || true
          [ -f style.css ] && mv style.css www/ || true
          [ -f game.js ] && mv game.js www/ || true
          [ -f icon.png ] && mv icon.png www/ || true

      - name: Initialize Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          
          # Fake pod binary to bypass CLI sync check
          mkdir -p bin
          echo '#!/bin/bash' > bin/pod
          echo 'exit 0' >> bin/pod
          chmod +x bin/pod
          export PATH=$PWD/bin:$PATH
          npx cap add ios

      - name: Configure and Install
        run: |
          cd ios/App
          # Patch the Capacitor podspec to allow iOS 14.0 before install
          find ../../node_modules/@capacitor/ios -name "*.podspec" -exec sed -i '' 's/ios.deployment_target = .*/ios.deployment_target = '\''14.0'\''/g' {} +
          
          # Create fresh Podfile
          cat << 'EOF' > Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          # Perform clean installation
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          npx cap copy ios
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
