name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Initialize and Add iOS Platform
        # CAPACITOR_SKIP_POD_INSTALL=1 stops the CLI from running pod install
        env:
          CAPACITOR_SKIP_POD_INSTALL: 1
        run: |
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          npx cap add ios

      - name: Configure Podfile and Install
        run: |
          # Create a fresh Podfile with the required iOS 14.0 target
          mkdir -p ios/App
          cat << 'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          # Now perform the install manually
          cd ios/App
          pod install --repo-update

      - name: Sync and Build
        run: |
          npx cap sync ios
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
