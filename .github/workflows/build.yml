name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          [ -f index.html ] && mv index.html www/ || true
          [ -f style.css ] && mv style.css www/ || true
          [ -f game.js ] && mv game.js www/ || true
          [ -f icon.png ] && mv icon.png www/ || true

      - name: Manual Scaffolding (No CLI Add)
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets
          rm -rf ios
          # Just initialize the config, but do not 'add' the platform via CLI
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          
          # Manually create the required iOS directory structure
          mkdir -p ios/App/App
          # Create the basic config
          echo '{"appId": "com.tvman.amongusdetectiveevolution", "appName": "Among Us: Detective Evolution", "webDir": "www"}' > ios/App/App/capacitor.config.json

      - name: Manual Podfile Creation and Install
        run: |
          cd ios/App
          # Write a Podfile with the 14.0 target requirement
          cat << 'EOF' > Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          # Manually trigger pod installation
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          # Since we didn't use 'cap add', we need to manually sync assets
          mkdir -p ios/App/App/public
          cp -r www/* ios/App/App/public/
          
          cd ios/App
          # Xcodebuild directly; we'll use a generated xcworkspace if it exists or fallback
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0 || \
          xcodebuild -project App.xcodeproj -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
