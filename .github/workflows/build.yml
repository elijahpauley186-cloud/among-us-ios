name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # Ensures your files are in the directory Capacitor expects
          [ -f index.html ] && mv index.html www/ 2>/dev/null || true
          [ -f style.css ] && mv style.css www/ 2>/dev/null || true
          [ -f game.js ] && mv game.js www/ 2>/dev/null || true
          [ -f icon.png ] && mv icon.png www/ 2>/dev/null || true

      - name: Initialize iOS Platform
        # CAPACITOR_SKIP_POD_INSTALL=1 prevents the CLI from running its 
        # own incompatible pod install
        env:
          CAPACITOR_SKIP_POD_INSTALL: 1
        run: |
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          npx cap add ios

      - name: Enforce iOS 14.0 Target
        run: |
          mkdir -p ios/App
          # Explicitly write the Podfile with the required deployment target
          cat << 'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          # Manually install dependencies with the enforced target
          cd ios/App
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build and Package
        run: |
          npx cap sync ios
          cd ios/App
          # Explicitly set the deployment target during the build command for final compliance
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
