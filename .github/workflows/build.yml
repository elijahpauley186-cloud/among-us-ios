name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Initialize and Add iOS
        run: |
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          # Adding the platform
          npx cap add ios

      - name: Update Deployment Target and Install Pods
        run: |
          cd ios/App
          # Force the deployment target to 14.0 in the Podfile
          sed -i '' "s/platform :ios, .*/platform :ios, '14.0'/g" Podfile
          # Now perform the install with the updated target
          pod install --repo-update

      - name: Sync and Build
        run: |
          npx cap sync ios
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
