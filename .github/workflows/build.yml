name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Prepare iOS Project Structure
        run: |
          # 1. Clean up
          rm -rf ios
          
          # 2. Run initialization
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          
          # 3. Create the directory manually BEFORE adding the platform
          mkdir -p ios/App
          
          # 4. Write the Podfile with the correct target (14.0)
          cat << 'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF

      - name: Add Platform (Skip Auto-Install)
        # We use a non-existent flag to ensure the process continues if it errors on pod install
        run: |
          npx cap add ios || true

      - name: Run Clean Pod Install
        run: |
          cd ios/App
          pod install --repo-update

      - name: Generate App Icons
        run: |
          mkdir -p assets
          cp icon.png assets/icon-only.png
          npx capacitor-assets generate --ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build Xcode Project
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package IPA Bundle
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
