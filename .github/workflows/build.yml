name: Build iOS IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/assets

      - name: Initialize and Add iOS Platform
        env:
          CAPACITOR_SKIP_POD_INSTALL: 1
        run: |
          # 1. Prepare assets in a valid subdirectory
          mkdir -p www
          # Move html, js, and css files into www
          mv *.html www/ 2>/dev/null || true
          mv *.js www/ 2>/dev/null || true
          mv *.css www/ 2>/dev/null || true
          
          # 2. Cleanup and Initialize
          rm -rf ios
          npx cap init "Among Us: Detective Evolution" "com.tvman.amongusdetectiveevolution" --web-dir="www"
          npx cap add ios

      - name: Configure and Install Pods
        run: |
          mkdir -p ios/App
          # 1. Force a valid 14.0 target
          cat << 'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          # 2. Purge old files and perform a clean install
          cd ios/App
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Sync, Build, and Package
        run: |
          npx cap sync ios
          cd ios/App
          # Build with explicit deployment target
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=14.0
          
          # Package the IPA
          mkdir -p ../../Payload
          cp -r build/Release-iphoneos/App.app ../../Payload/
          cd ../..
          zip -r AmongUsDetectiveEvolution.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Among-Us-Detective-Evolution-App
          path: AmongUsDetectiveEvolution.ipa
